title: Graysen Brinkman
favicon: "/favicon.ico"
email: graysenbrinkman@gmail.com
description: >
  Portfolio of Graysen Brinkman, Aerospace Engineering student at Embry-Riddle Aeronautical University.
minimal_mistakes_skin: default
search: false

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/

include:
  - _pages

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-include-cache

defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_projects"
      type: projects
    values:
      layout: project

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

atom_feed:
  hide: true
  
sass:
  sass_dir: _sass

collections:
  projects:
    output: true
    permalink: /projects/:name/